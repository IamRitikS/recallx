<!DOCTYPE html>
<html>
<head>
  <title>Periodic Table Trainer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #fafafa;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 6px;
    }

    .score {
      text-align: center;
      font-size: 16px;
      color: #555;
      margin-bottom: 14px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 18px;
      font-size: 15px;
      border-radius: 8px;
      border: none;
      background-color: #ddd;
      cursor: pointer;
      transition: 0.15s;
    }

    button:active {
      transform: scale(0.97);
    }

    .table-wrapper {
      overflow-x: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(18, 52px);
      grid-template-rows: repeat(7, 55px) 18px 55px 55px;
      gap: 3px;
      width: max-content;
      margin: auto;
    }

    .cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      position: relative;
      box-sizing: border-box;
    }

    .cell .num {
      font-size: 9px;
      color: #999;
      position: absolute;
      top: 2px;
      left: 4px;
      line-height: 1;
    }

    .cell input {
      width: 40px;
      text-align: center;
      border: none;
      background: transparent;
      font-size: 14px;
      font-weight: bold;
      outline: none;
      padding: 0;
      margin-top: 10px;
      color: #222;
    }

    .cell.correct {
      background-color: #c8e6c9;
      border-color: #81c784;
    }

    .cell.wrong {
      background-color: #ffcdd2;
      border-color: #e57373;
    }

    .cell.placeholder {
      background: #eeeeee;
      border-color: #ccc;
      font-size: 10px;
      color: #888;
      text-align: center;
      cursor: default;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

<h1>Periodic Table Trainer</h1>
<div class="score" id="score">0 / 118 correct</div>

<div class="controls">
  <button onclick="resetAll()">Reset</button>
  <button onclick="revealAll()">Reveal All</button>
  <button onclick="window.location.href='index.html'">Back</button>
</div>

<div class="table-wrapper">
  <div class="grid" id="grid"></div>
</div>

  {num:103, sym:'Lr', row:10, col:17},

const grid = document.getElementById('grid');
const scoreEl = document.getElementById('score');

// Placeholder cells for lanthanide/actinide series in main table
const lanthP = document.createElement('div');
lanthP.className = 'cell placeholder';
lanthP.style.gridRow = '6';
lanthP.style.gridColumn = '3';
lanthP.textContent = '57–71';
grid.appendChild(lanthP);

const actP = document.createElement('div');
actP.className = 'cell placeholder';
actP.style.gridRow = '7';
actP.style.gridColumn = '3';
actP.textContent = '89–103';
grid.appendChild(actP);

// Build all element cells
elements.forEach(el => {
  const cell = document.createElement('div');
  cell.className = 'cell';
  cell.style.gridRow = el.row;
  cell.style.gridColumn = el.col;

  const numSpan = document.createElement('span');
  numSpan.className = 'num';
  numSpan.textContent = el.num;

  const input = document.createElement('input');
  input.type = 'text';
  input.maxLength = 3;
  input.setAttribute('data-sym', el.sym);

  input.addEventListener('input', function () {
    const val = this.value.trim();
    if (val === '') {
      cell.className = 'cell';
    } else if (val.toLowerCase() === el.sym.toLowerCase()) {
      cell.className = 'cell correct';
    } else {
      cell.className = 'cell wrong';
    }
    updateScore();
  });

  cell.appendChild(numSpan);
  cell.appendChild(input);
  grid.appendChild(cell);
});

function updateScore() {
  const correct = document.querySelectorAll('.cell.correct').length;
  scoreEl.textContent = correct + ' / 118 correct';
}

function resetAll() {
  document.querySelectorAll('.cell input').forEach(input => {
    input.value = '';
    input.closest('.cell').className = 'cell';
  });
  updateScore();
}

function revealAll() {
  document.querySelectorAll('.cell input').forEach(input => {
    input.value = input.getAttribute('data-sym');
    input.closest('.cell').className = 'cell correct';
  });
  updateScore();
}
</script>

</body>
</html>
