<!DOCTYPE html>
<html>
<head>
  <title>Biology</title>

  <!-- Mobile responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../styles.css">

  <style>
    body {
      text-align: center;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 40px;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 400px;
      margin: auto;
    }

    .item {
      font-size: 20px;
      padding: 15px;
      border-radius: 10px;
      background-color: #e8f5e9;
      cursor: pointer;
      transition: 0.2s;
      user-select: none;
    }

    .item:active {
      transform: scale(0.97);
      background-color: #c8e6c9;
    }

    button {
      margin-top: 30px;
    }

    @media (min-width: 600px) {
      h1 { font-size: 40px; }
      .item { font-size: 22px; }
    }
  </style>
</head>

<body>

<h1>Biology</h1>

<div class="container">
  <div class="item" onclick="goTo('./calvin-cycle.html')">Calvin Cycle</div>
  <div class="item" onclick="goTo('./chapter-wise-mcq.html')">Chapter-wise MCQs</div>
</div>

<button onclick="goTo('../index.html')">Back</button>

<script>
function goTo(page) {
  window.location.href = page;
}
</script>

</body>
</html>
