<html>
<head>
  <title>Physics</title>

  <!-- Mobile responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background-color: #ddd;
      cursor: pointer;
      transition: 0.2s;
    }

    button:active {
      transform: scale(0.97);
    }

    @media (min-width: 600px) {
      h1 {
        font-size: 40px;
      }

      p {
        font-size: 20px;
      }
    }
  </style>
</head>
